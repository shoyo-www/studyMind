<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#6c63ff"/>

  <!-- Open book — left page -->
  <path d="M8 21 L8 11 Q16 9 16 11 L16 21" fill="white" opacity="0.95"/>

  <!-- Open book — right page (slightly dimmer for depth) -->
  <path d="M24 21 L24 11 Q16 9 16 11 L16 21" fill="white" opacity="0.72"/>

  <!-- Spine line -->
  <line x1="16" y1="11" x2="16" y2="21" stroke="#6c63ff" stroke-width="0.8"/>

  <!-- Book base curve -->
  <path d="M8 21 Q16 23.5 24 21" stroke="white" stroke-width="1.3" fill="none" stroke-linecap="round"/>

  <!-- Neural sparkle — main dot -->
  <circle cx="21" cy="7.5" r="1.8" fill="white"/>
  <!-- Neural sparkle — secondary dots -->
  <circle cx="24.5" cy="5" r="1.1" fill="white" opacity="0.7"/>
  <circle cx="19" cy="4.5" r="0.9" fill="white" opacity="0.5"/>
  <!-- Connection lines -->
  <line x1="21" y1="5.7" x2="21" y2="4.5" stroke="white" stroke-width="0.7" opacity="0.4"/>
  <line x1="22.4" y1="6.5" x2="23.7" y2="5.5" stroke="white" stroke-width="0.7" opacity="0.4"/>
</svg>
