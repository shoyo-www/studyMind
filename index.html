<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary favicon (SVG — works in all modern browsers) -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Apple touch icon (iOS home screen) -->
    <link rel="apple-touch-icon" href="/logo192.svg" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#6c63ff" />

    <!-- Title + description -->
    <title>StudyMind — AI Learning Platform</title>
    <meta name="description" content="Upload your notes and study with AI. Quiz generation, flashcards, mock tests, and a personal AI tutor — all from your own PDFs." />

    <!-- Open Graph -->
    <meta property="og:title"       content="StudyMind — AI Learning Platform" />
    <meta property="og:description" content="Upload your notes and study with AI. Quiz generation, flashcards, mock tests, and a personal AI tutor." />
    <meta property="og:type"        content="website" />
    <meta property="og:image"       content="/logo192.svg" />

    <!-- Twitter -->
    <meta name="twitter:card"        content="summary" />
    <meta name="twitter:title"       content="StudyMind — AI Learning Platform" />
    <meta name="twitter:description" content="Your AI study assistant — quiz, flashcards, mock tests from your own notes." />
    <meta name="twitter:image"       content="/logo192.svg" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=Noto+Sans+Devanagari:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
